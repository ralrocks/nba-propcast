services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: propcast
      POSTGRES_USER: propcast
      POSTGRES_PASSWORD: propcast
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://propcast:propcast@postgres:5432/propcast
    depends_on:
      - postgres
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
