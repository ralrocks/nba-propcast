name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── ml-pipeline tests ──────────────────────────────────────────────────────
  ml-pipeline:
    name: ML pipeline tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-pipeline

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "ml-pipeline/uv.lock"

      - name: Install deps
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Tests
        run: uv run pytest tests/ -v --tb=short

  # ── backend tests ──────────────────────────────────────────────────────────
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install deps
        run: uv sync --extra dev --frozen

      - name: Lint
        run: uv run ruff check app/ main.py tests/

      - name: Tests
        # Most tests skip gracefully when ML artifacts aren't present.
        # The error-handling tests (health, invalid inputs, 404s) always run.
        run: uv run pytest tests/ -v --tb=short

  # ── frontend build ─────────────────────────────────────────────────────────
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm install --no-audit

      - name: Type-check + build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000

  # ── docker build smoke test ────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    # Only run on push to main to keep PR feedback fast
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t propcast-backend:ci .

      - name: Build frontend image
        run: >
          docker build
          -f frontend/Dockerfile
          --build-arg VITE_API_URL=http://localhost:8000
          -t propcast-frontend:ci
          .

      - name: Smoke-test backend container
        run: |
          docker run -d --name backend-ci \
            -p 8000:8000 \
            -e DATABASE_URL=sqlite:////tmp/test.db \
            -e MODELS_DIR=/tmp/models \
            -e FEATURE_PATH=/tmp/features.parquet \
            -e BACKTEST_RESULTS_PATH=/tmp/backtest.json \
            propcast-backend:ci

          # Wait up to 30 s for /health, dumping logs on failure
          for i in $(seq 1 12); do
            sleep 3
            echo "=== container logs (attempt $i) ==="
            docker logs backend-ci 2>&1 || true
            if curl -sf http://localhost:8000/health; then
              echo "Health check passed"
              docker stop backend-ci
              exit 0
            fi
            echo "Not ready yet (attempt $i/12)..."
          done
          echo "=== FINAL container logs ==="
          docker logs backend-ci 2>&1 || true
          docker stop backend-ci || true
          echo "Health check timed out after 36 s"
          exit 1
